<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Embedding similarity versus leakage risk</title>
  <desc id="desc">A scatter plot showing that semantic similarity and evaluation leakage risk are related but not equivalent.</desc>
  <rect width="1040" height="620" fill="#fbfaf7"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">Similarity is not leakage</text>
  <text x="70" y="90" font-family="Inter, Arial, sans-serif" font-size="16" fill="#52606d">Embeddings are useful for triage, but the decision variable is unfair evaluation advantage.</text>

  <g transform="translate(105 125)">
    <rect x="0" y="0" width="810" height="390" fill="#ffffff" stroke="#d9e2ec"/>
    <rect x="500" y="0" width="310" height="190" fill="#ffe3e3" opacity="0.78"/>
    <rect x="500" y="190" width="310" height="200" fill="#fffbea" opacity="0.86"/>
    <rect x="0" y="0" width="370" height="190" fill="#fffbea" opacity="0.72"/>
    <rect x="0" y="190" width="370" height="200" fill="#e3f9e5" opacity="0.78"/>

    <line x1="0" y1="390" x2="810" y2="390" stroke="#334e68" stroke-width="2"/>
    <line x1="0" y1="390" x2="0" y2="0" stroke="#334e68" stroke-width="2"/>
    <polygon points="810,390 797,384 797,396" fill="#334e68"/>
    <polygon points="0,0 -6,13 6,13" fill="#334e68"/>

    <text x="585" y="54" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a1c1c">High risk</text>
    <text x="540" y="80" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9b2c2c">remove or manually review</text>
    <text x="585" y="280" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#7c5700">False positives</text>
    <text x="535" y="306" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a6d1d">similar topic, no privileged answer</text>
    <text x="104" y="92" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#7c5700">Missed by embeddings</text>
    <text x="62" y="118" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a6d1d">answer-only or source-level leakage</text>
    <text x="118" y="318" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f5132">Low risk</text>

    <circle cx="640" cy="105" r="10" fill="#d64545"/>
    <text x="657" y="111" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">paraphrased benchmark</text>
    <circle cx="715" cy="148" r="10" fill="#d64545"/>
    <text x="732" y="154" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">translation</text>
    <circle cx="555" cy="165" r="10" fill="#d64545"/>
    <text x="572" y="171" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">solution explanation</text>

    <circle cx="650" cy="280" r="10" fill="#f59f00"/>
    <text x="667" y="286" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">same textbook chapter</text>
    <circle cx="570" cy="335" r="10" fill="#f59f00"/>
    <text x="587" y="341" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">domain article</text>

    <circle cx="210" cy="125" r="10" fill="#f59f00"/>
    <text x="227" y="131" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">answer key table</text>
    <circle cx="300" cy="160" r="10" fill="#f59f00"/>
    <text x="317" y="166" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">GitHub solution file</text>
    <circle cx="260" cy="315" r="10" fill="#2f9e44"/>
    <text x="277" y="321" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">weak topical match</text>

    <text x="270" y="448" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Embedding similarity</text>
    <text x="250" y="471" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">what the vector search sees</text>
    <text transform="translate(-58 315) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Leakage risk</text>
    <text transform="translate(-34 345) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">privileged access to eval answer or task</text>
  </g>
</svg>
