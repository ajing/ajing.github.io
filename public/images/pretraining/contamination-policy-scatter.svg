<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Contamination removal policy scatter</title>
  <desc id="desc">A scatter plot mapping contamination severity and match confidence to remove, review, or keep decisions.</desc>
  <rect width="1040" height="620" fill="#fbfaf7"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">Decontamination needs policy, not one threshold</text>
  <text x="70" y="90" font-family="Inter, Arial, sans-serif" font-size="16" fill="#52606d">The same match score means different things depending on whether it leaks the prompt, answer, solution, or only the topic.</text>

  <g transform="translate(105 125)">
    <rect x="0" y="0" width="810" height="390" fill="#ffffff" stroke="#d9e2ec"/>
    <rect x="500" y="0" width="310" height="170" fill="#ffe3e3" opacity="0.82"/>
    <rect x="315" y="95" width="360" height="210" fill="#fffbea" opacity="0.85"/>
    <rect x="0" y="230" width="360" height="160" fill="#e3f9e5" opacity="0.8"/>

    <line x1="0" y1="390" x2="810" y2="390" stroke="#334e68" stroke-width="2"/>
    <line x1="0" y1="390" x2="0" y2="0" stroke="#334e68" stroke-width="2"/>
    <polygon points="810,390 797,384 797,396" fill="#334e68"/>
    <polygon points="0,0 -6,13 6,13" fill="#334e68"/>

    <text x="610" y="54" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a1c1c">Remove</text>
    <text x="548" y="80" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9b2c2c">prompt + answer, solution, benchmark mirror</text>
    <text x="435" y="210" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#7c5700">Review / quarantine</text>
    <text x="410" y="236" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a6d1d">paraphrase, translation, partial leak</text>
    <text x="118" y="315" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f5132">Keep / monitor</text>
    <text x="86" y="341" font-family="Inter, Arial, sans-serif" font-size="14" fill="#276749">weak topical similarity without answer access</text>

    <circle cx="690" cy="75" r="10" fill="#d64545"/>
    <text x="707" y="81" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">exact Q+A</text>
    <circle cx="635" cy="125" r="10" fill="#d64545"/>
    <text x="652" y="131" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">HumanEval solution repo</text>
    <circle cx="545" cy="145" r="10" fill="#d64545"/>
    <text x="562" y="151" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">benchmark mirror</text>

    <circle cx="505" cy="215" r="10" fill="#f59f00"/>
    <text x="522" y="221" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">translated item</text>
    <circle cx="410" cy="260" r="10" fill="#f59f00"/>
    <text x="427" y="266" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">answer sentence only</text>
    <circle cx="585" cy="270" r="10" fill="#f59f00"/>
    <text x="602" y="276" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">paraphrased task</text>

    <circle cx="235" cy="300" r="10" fill="#2f9e44"/>
    <text x="252" y="306" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">same topic textbook</text>
    <circle cx="305" cy="350" r="10" fill="#2f9e44"/>
    <text x="322" y="356" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2933">background article</text>

    <text x="285" y="448" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Match confidence</text>
    <text x="260" y="471" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">exact, n-gram, semantic, source-level</text>
    <text transform="translate(-58 315) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Leakage severity</text>
    <text transform="translate(-34 330) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">topic only to full answer access</text>
  </g>
</svg>
