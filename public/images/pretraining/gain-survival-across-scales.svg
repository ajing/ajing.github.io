<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Gain survival across model scales</title>
  <desc id="desc">A line chart showing a pretraining idea that survives scale, one that fades, and one that reverses.</desc>
  <rect width="1040" height="620" fill="#fbfaf7"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">Gain must survive the scaling ladder</text>
  <text x="70" y="90" font-family="Inter, Arial, sans-serif" font-size="16" fill="#52606d">The exact delta can shrink, but the direction should not randomly flip.</text>

  <g transform="translate(115 125)">
    <rect x="0" y="0" width="790" height="390" fill="#ffffff" stroke="#d9e2ec"/>
    <line x1="0" y1="195" x2="790" y2="195" stroke="#9fb3c8" stroke-width="2"/>
    <text x="8" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#52606d">baseline</text>

    <g stroke="#e6ecf2" stroke-width="1">
      <line x1="0" y1="65" x2="790" y2="65"/>
      <line x1="0" y1="130" x2="790" y2="130"/>
      <line x1="0" y1="260" x2="790" y2="260"/>
      <line x1="0" y1="325" x2="790" y2="325"/>
      <line x1="135" y1="0" x2="135" y2="390"/>
      <line x1="330" y1="0" x2="330" y2="390"/>
      <line x1="525" y1="0" x2="525" y2="390"/>
      <line x1="720" y1="0" x2="720" y2="390"/>
    </g>

    <line x1="0" y1="390" x2="790" y2="390" stroke="#334e68" stroke-width="2"/>
    <line x1="0" y1="390" x2="0" y2="0" stroke="#334e68" stroke-width="2"/>

    <polyline points="135,170 330,150 525,128 720,105" fill="none" stroke="#2f9e44" stroke-width="5"/>
    <circle cx="135" cy="170" r="8" fill="#2f9e44"/>
    <circle cx="330" cy="150" r="8" fill="#2f9e44"/>
    <circle cx="525" cy="128" r="8" fill="#2f9e44"/>
    <circle cx="720" cy="105" r="8" fill="#2f9e44"/>

    <polyline points="135,160 330,178 525,192 720,198" fill="none" stroke="#f59f00" stroke-width="5"/>
    <circle cx="135" cy="160" r="8" fill="#f59f00"/>
    <circle cx="330" cy="178" r="8" fill="#f59f00"/>
    <circle cx="525" cy="192" r="8" fill="#f59f00"/>
    <circle cx="720" cy="198" r="8" fill="#f59f00"/>

    <polyline points="135,166 330,205 525,240 720,286" fill="none" stroke="#d64545" stroke-width="5"/>
    <circle cx="135" cy="166" r="8" fill="#d64545"/>
    <circle cx="330" cy="205" r="8" fill="#d64545"/>
    <circle cx="525" cy="240" r="8" fill="#d64545"/>
    <circle cx="720" cy="286" r="8" fill="#d64545"/>

    <text x="735" y="111" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#2f9e44">move forward</text>
    <text x="735" y="203" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#a16207">hold</text>
    <text x="735" y="291" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#9b2c2c">stop</text>

    <text x="108" y="425" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334e68">100M</text>
    <text x="303" y="425" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334e68">300M</text>
    <text x="505" y="425" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334e68">1B</text>
    <text x="705" y="425" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334e68">7B</text>
    <text x="328" y="462" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Model scale</text>

    <text transform="translate(-60 290) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Loss delta vs baseline</text>
    <text transform="translate(-34 274) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">lower is better</text>
    <text x="9" y="58" font-family="Inter, Arial, sans-serif" font-size="13" fill="#2f9e44">better</text>
    <text x="9" y="350" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9b2c2c">worse</text>
  </g>
</svg>
