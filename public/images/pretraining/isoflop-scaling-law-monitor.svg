<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">IsoFLOP scaling-law monitor</title>
  <desc id="desc">A monitoring chart showing validation loss versus training FLOPs across model scales and batch conditions, with a scaling-law prediction band.</desc>
  <rect width="1040" height="620" fill="#fbfaf7"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">Monitor small-scale runs against the scaling-law pattern</text>
  <text x="70" y="90" font-family="Inter, Arial, sans-serif" font-size="16" fill="#52606d">Move forward when runs stay inside the prediction band; stop and diagnose when they drift above it.</text>

  <g transform="translate(105 120)">
    <rect x="0" y="0" width="810" height="405" fill="#ffffff" stroke="#d9e2ec"/>

    <g stroke="#e6ecf2" stroke-width="1">
      <line x1="0" y1="65" x2="810" y2="65"/>
      <line x1="0" y1="135" x2="810" y2="135"/>
      <line x1="0" y1="205" x2="810" y2="205"/>
      <line x1="0" y1="275" x2="810" y2="275"/>
      <line x1="0" y1="345" x2="810" y2="345"/>
      <line x1="95" y1="0" x2="95" y2="405"/>
      <line x1="250" y1="0" x2="250" y2="405"/>
      <line x1="405" y1="0" x2="405" y2="405"/>
      <line x1="560" y1="0" x2="560" y2="405"/>
      <line x1="715" y1="0" x2="715" y2="405"/>
    </g>

    <path d="M72 95 C170 122, 248 152, 330 184 C425 222, 520 252, 615 278 C690 297, 735 307, 770 315 L770 350 C720 340, 660 327, 590 306 C500 279, 415 249, 330 214 C245 182, 165 150, 72 130 Z" fill="#d9f99d" opacity="0.55"/>
    <path d="M72 112 C172 142, 250 172, 330 198 C425 233, 520 263, 615 292 C690 312, 735 322, 770 332" fill="none" stroke="#2f9e44" stroke-width="4"/>
    <text x="602" y="354" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#276749">expected scaling-law band</text>

    <line x1="0" y1="405" x2="810" y2="405" stroke="#334e68" stroke-width="2"/>
    <line x1="0" y1="405" x2="0" y2="0" stroke="#334e68" stroke-width="2"/>
    <polygon points="810,405 797,399 797,411" fill="#334e68"/>
    <polygon points="0,0 -6,13 6,13" fill="#334e68"/>

    <line x1="405" y1="0" x2="405" y2="405" stroke="#9fb3c8" stroke-dasharray="8 8" stroke-width="2"/>
    <text x="374" y="424" font-family="Inter, Arial, sans-serif" font-size="12" fill="#627d98">same FLOPs</text>

    <circle cx="95" cy="125" r="9" fill="#2f9e44"/>
    <text x="110" y="131" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">100M, good batch</text>
    <circle cx="250" cy="178" r="9" fill="#2f9e44"/>
    <text x="265" y="184" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">300M</text>
    <circle cx="405" cy="230" r="9" fill="#2f9e44"/>
    <text x="420" y="250" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">1B</text>
    <circle cx="560" cy="282" r="9" fill="#2f9e44"/>
    <text x="575" y="288" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">3B</text>
    <circle cx="715" cy="325" r="9" fill="#2f9e44"/>
    <text x="730" y="331" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">7B</text>

    <rect x="396" y="210" width="18" height="18" rx="2" fill="#2563eb"/>
    <text x="420" y="224" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">isoFLOP candidate on band</text>
    <rect x="396" y="288" width="18" height="18" rx="2" fill="#2563eb"/>
    <text x="420" y="302" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">smaller model, more tokens</text>

    <polygon points="246,92 258,114 234,114" fill="#f59f00"/>
    <text x="268" y="110" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c5700">batch too large or LR wrong</text>
    <text x="268" y="128" font-family="Inter, Arial, sans-serif" font-size="12" fill="#8a6d1d">reduce batch, retune LR, rerun</text>

    <polygon points="552,170 564,192 540,192" fill="#f59f00"/>
    <text x="574" y="186" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c5700">optimization drift</text>
    <text x="574" y="204" font-family="Inter, Arial, sans-serif" font-size="12" fill="#8a6d1d">training no longer follows proxy curve</text>

    <path d="M690 230 L704 244 L690 258 L676 244 Z" fill="#d64545"/>
    <text x="713" y="244" font-family="Inter, Arial, sans-serif" font-size="13" fill="#8a1c1c">data bottleneck / bad mix</text>
    <text x="713" y="262" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9b2c2c">add data or remix, then retrain</text>

    <text x="70" y="452" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334e68">1e19</text>
    <text x="222" y="452" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334e68">1e20</text>
    <text x="377" y="452" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334e68">1e21</text>
    <text x="532" y="452" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334e68">1e22</text>
    <text x="687" y="452" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334e68">1e23</text>
    <text x="314" y="484" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Training FLOPs (log scale)</text>
    <text transform="translate(-58 295) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334e68">Held-out validation loss</text>
    <text transform="translate(-34 305) rotate(-90)" font-family="Inter, Arial, sans-serif" font-size="13" fill="#627d98">lower is better</text>
  </g>
</svg>
